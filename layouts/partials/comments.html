{{- if .Site.Params.comments }}
<div class="comments-wrap" style="margin-top:48px;padding-top:24px;border-top:1px solid var(--border-mid)">
  <h3 style="font-family:var(--font-serif);font-size:13px;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:20px;color:var(--ink)">Comments</h3>
  <script src="https://giscus.app/client.js"
    data-repo="mhlimon/mhlimon"
    data-repo-id="YOUR_REPO_ID"
    data-category="Announcements"
    data-category-id="YOUR_CATEGORY_ID"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="preferred_color_scheme"
    data-lang="en"
    crossorigin="anonymous"
    async>
  </script>
  <p style="font-size:11px;color:var(--ink-faint);font-family:var(--font-serif);font-style:italic;margin-top:12px">
    Comments powered by <a href="https://giscus.app" target="_blank" style="color:var(--ink-faint)">Giscus</a> via GitHub Discussions. Login with GitHub to comment.
  </p>
</div>
{{- end }}

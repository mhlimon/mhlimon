{{ define "main" }}
<div style="max-width: 1100px; margin: 0 auto; padding: 40px 15px;">

    <div style="text-align: center; margin-bottom: 60px;">
        <h1 style="font-size: 2.8rem;">Notes</h1>
        <p style="font-size: 1.25rem; color: #555;">Field observations, study notes, lessons learned, and engineering references</p>
    </div>

    <div class="notes-grid">
        {{ range .Paginator.Pages }}
        <div class="note-card">
            <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
            <div class="meta">{{ .Date.Format "02 January 2006" }}</div>
            <p class="summary">{{ .Summary | plainify | truncate 200 }}...</p>
            <a href="{{ .RelPermalink }}" class="read-link">View Note →</a>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}

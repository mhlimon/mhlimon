{{ define "main" }}
<div class="bangla-list-page" style="max-width: 900px; margin: 0 auto; padding: 20px;">

    <div style="text-align: center; margin: 40px 0 70px;">
        <h1 style="font-size: 2.9rem; margin-bottom: 12px; color: #1f2a1f;">রাফখাতা</h1>
        <p style="font-size: 1.25rem; color: #666; max-width: 600px; margin: 0 auto;">
            অপরিপক্ক কিন্তু সৎ লেখালেখির ডায়েরি
        </p>
    </div>

    <div class="article-list">
        {{ range .Paginator.Pages }}
        <article class="article-card">
            <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
            
            <div class="meta">
                {{ .Date.Format "2 January 2006" }} • {{ .ReadingTime }} মিনিট পড়া
            </div>
            
            <p class="summary">
                {{ .Summary | plainify | truncate 260 }}...
            </p>
            
            <a href="{{ .RelPermalink }}" class="read-more">আরও পড়ুন →</a>
        </article>
        {{ end }}
    </div>

    {{ template "_internal/pagination.html" . }}
</div>
{{ end }}

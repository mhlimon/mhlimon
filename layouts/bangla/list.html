{{ define "main" }}
<div style="max-width: 1200px; margin: 0 auto; padding: 20px 15px;">

    <div style="text-align: center; margin: 40px 0 60px;">
        <h1 style="font-size: 2.9rem; margin-bottom: 12px;">রাফখাতা</h1>
        <p style="font-size: 1.25rem; color: #555;">অপরিপক্ক কিন্তু সৎ লেখালেখির ডায়েরি</p>
    </div>

    <div class="article-grid">
        {{ range.Paginator.Pages }}
        <div class="article-card">
            <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
            
            <div class="meta">
                {{ .Date.Format "2 January 2006" }} • {{ .ReadingTime }} মিনিট
            </div>
            
            <p class="summary">
                {{ .Summary | plainify | truncate 180 }}...
            </p>
            
            <a href="{{ .RelPermalink }}" class="read-btn">পড়ুন</a>
        </div>
        {{ end }}
    </div>

    {{ template "_internal/pagination.html" . }}
</div>
{{ end }}

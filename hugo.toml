baseURL = "https://mhlimon.com"
title = "mhlimon"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
enableGitInfo = true

defaultContentLanguage = "bn"
languageCode = "bn-BD"
hasCJKLanguage = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "Mehedi Hossen Limon"
  description = "Power plant engineer. Talibul ilm. Writing about life, Islam, and the world between two classrooms."
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowBreadCrumbs = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtags = true
  ShowAllPagesInArchive = true
  mainSections = ["bangla", "tech"]

  # Google Analytics — replace with your real ID
  googleAnalytics = "G-XXXXXXXXXX"

  # Profile photo — upload your photo as static/images/avatar.jpg
  # avatar = "/images/avatar.jpg"

  assets.disableFingerprinting = true

  # Search
  fuseOpts.isCaseSensitive = false
  fuseOpts.shouldSort = true
  fuseOpts.location = 0
  fuseOpts.distance = 1000
  fuseOpts.threshold = 0.4
  fuseOpts.minMatchCharLength = 1
  fuseOpts.keys = ["title", "permalink", "summary", "content"]

  # Open Graph image (create a 1200x630 image, upload to static/images/)
  images = ["/images/og-image.png"]

  [params.homeInfoParams]
    Title = "Mehedi Hossen Limon"
    Content = "Power plant engineer · তালিবুল ইলম · Writing about life and Islam"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/mhlimon"

  [[params.socialIcons]]
    name = "facebook"
    url = "https://fb.com/mehedihossen.limon"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = "https://github.com/mhlimon/mhlimon/edit/main/content"
    Text = "✏️ Edit"
    appendFilePath = true


# সোশ্যাল লিঙ্ক
[social]
  linkedin = "https://linkedin.com/in/mhlimon"
  facebook = "https://fb.com/mehedihossen.limon"
  github = "https://github.com/mhlimon"

# PaperMod কনফিগারেশন (নতুন লুক)
[params]
  description = "Engineer • তালিবুল ইলম • Writer"
  author = "Mehedi Hossen Limon"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowToc = true

  # নতুন কালার স্কিম (আপনার ব্র্যান্ডের জন্য)
  accentColor = "#2c5f2d"        # Deep Green (ইলম + প্রকৃতি)
  mainColor = "#1e3a8a"           # Professional Blue

  # হোমপেজ
  homeInfoParams:
    Title = "Mehedi Hossen Limon"
    Content = "Power Plant Engineer by profession.<br>তালিবুল ইলম by passion.<br>লেখক by necessity."

# সোশ্যাল লিঙ্ক
[social]
  linkedin = "https://linkedin.com/in/mhlimon"
  facebook = "https://fb.com/mehedihossen.limon"
  github = "https://github.com/mhlimon"

# ========================
# PaperMod কনফিগারেশন
# ========================
[params]
  author = "Mehedi Hossen Limon"
  description = "Power Plant I&C Engineer • তালিবুল ইলম • Writer"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowBreadCrumbs = true

  # হোমপেজ হিরো সেকশন
  [params.homeInfoParams]
    Title = "Mehedi Hossen Limon"
    Content = "Instrumentation & Control Engineer by profession.<br>তালিবুল ইলম by passion.<br>লেখক by necessity."

  # কালার ও স্টাইল
  [params.style]
    accentColor = "#2c5f2d"

# ল্যাঙ্গুয়েজ সেটিং (বাংলা সাপোর্ট)

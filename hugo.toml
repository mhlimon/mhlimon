# সোশ্যাল লিঙ্ক
[social]
  linkedin = "https://linkedin.com/in/mhlimon"
  facebook = "https://fb.com/mehedihossen.limon"
  github = "https://github.com/mhlimon"

# ========================
# PaperMod কনফিগারেশন
# ========================
[params]
  author = "Mehedi Hossen Limon"
  description = "Power Plant Engineer • তালিবুল ইলম • Writer"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowBreadCrumbs = true


  # হোমপেজ হিরো সেকশন
  [params.homeInfoParams]
    Title = "Mehedi Hossen Limon"
    Content = "Engineering • Learning • Writing<br>Notes from a life spent learning."

  # কালার ও স্টাইল
  [params.style]
    accentColor = "#2c5f2d"

# ল্যাঙ্গুয়েজ সেটিং (বাংলা সাপোর্ট)
[languages.bn]
  languageCode = "bn-bd"
  title = "MH Limon"
  description = "পাওয়ার প্ল্যান্ট ইঞ্জিনিয়ার • তালিবুল ইলম • লেখক"

[outputs]
home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"
